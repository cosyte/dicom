name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs on new pushes to the same branch/PR (T-01-05-07).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    name: verify (node-${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # D-23: Node 18.18 (engines floor), 20.x LTS, 22.x LTS — Ubuntu only.
        node: ["18.18", "20", "22"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          # D-04 + D-06: pnpm 10.x pin (sibling uses 9; deliberate divergence).
          version: 10.33.1

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: PHI scan (test/fixtures/**)
        run: pnpm phi-scan

      - name: Test
        run: pnpm test

      - name: Test (with coverage)
        run: pnpm test:coverage

      - name: Build
        run: pnpm build

      - name: Verify dual-module build artifacts
        run: |
          test -f dist/index.mjs
          test -f dist/index.cjs
          test -f dist/index.d.ts

      - name: Smoke (ESM + CJS imports of dist/)
        run: pnpm smoke

      - name: typecheck:exports (attw on packed tarball)
        if: matrix.node == '20'
        run: |
          pnpm pack
          pnpm typecheck:exports

      - name: actionlint (validate workflow files)
        if: matrix.node == '20'
        uses: reviewdog/action-actionlint@v1
        with:
          actionlint_flags: -color=never .github/workflows/ci.yml .github/workflows/dictionary-regen.yml .github/workflows/publish.yml
